services:
  - type: web
    name: pos-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @pos/api run typecheck
    startCommand: pnpm --filter @pos/api start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: WEB_ORIGIN
        sync: false
