name: Keep API warm

on:
  schedule:
    # Every 14 minutes — Render's free tier sleeps after 15 min of no traffic.
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (also keeps Supabase's DB from auto-pausing)
        run: |
          if [ -z "${{ vars.RENDER_HEALTH_URL }}" ]; then
            echo "RENDER_HEALTH_URL repo variable is not set yet — skipping."
            exit 0
          fi
          curl -sf "${{ vars.RENDER_HEALTH_URL }}" || echo "Ping failed (service may be cold-starting)."
