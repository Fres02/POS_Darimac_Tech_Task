services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4001:4000"
    environment:
      PORT: "4000"
      NODE_ENV: development
    volumes:
      - .:/repo:cached
      - root_node_modules:/repo/node_modules
      - api_node_modules:/repo/apps/api/node_modules
      - web_node_modules:/repo/apps/web/node_modules
      - shared_node_modules:/repo/packages/shared/node_modules

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:4001"
    volumes:
      - .:/repo:cached
      - root_node_modules:/repo/node_modules
      - api_node_modules:/repo/apps/api/node_modules
      - web_node_modules:/repo/apps/web/node_modules
      - shared_node_modules:/repo/packages/shared/node_modules
    depends_on:
      - api

volumes:
  root_node_modules:
  api_node_modules:
  web_node_modules:
  shared_node_modules:
