services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      NODE_ENV: development
    volumes:
      - .:/repo
      - /repo/node_modules
      - /repo/apps/api/node_modules
      - /repo/apps/web/node_modules
      - /repo/packages/shared/node_modules

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:4000"
    volumes:
      - .:/repo
      - /repo/node_modules
      - /repo/apps/api/node_modules
      - /repo/apps/web/node_modules
      - /repo/packages/shared/node_modules
    depends_on:
      - api
